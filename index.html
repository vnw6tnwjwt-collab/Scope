<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Daily OS"/>
<title>Daily OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:#F2EBE2;font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;padding-bottom:calc(48px + env(safe-area-inset-bottom));}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;cursor:pointer;touch-action:manipulation;}
textarea,input{font-family:inherit;}
textarea:focus,button:focus,input:focus{outline:none;}
::-webkit-scrollbar{display:none;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:#F2EBE2;border-bottom:1px solid #EAE0D6;padding:12px 20px 10px;display:flex;justify-content:space-between;align-items:center;}
.nav-title{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#B0A49C;font-weight:500;}
.nav-tabs{display:flex;gap:6px;}
.nav-tab{font-size:12px;font-weight:500;padding:5px 14px;border-radius:100px;border:1.5px solid #C9BCB4;background:transparent;color:#9E9089;transition:all .2s;}
.nav-tab.active{background:#3A2E28;color:#F2EBE2;border-color:#3A2E28;}
.page{max-width:620px;margin:0 auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;}

/* COLLAPSIBLE SECTIONS */
.section{border-radius:16px;border:1px solid #EAE0D6;overflow:hidden;background:#FFFCF8;}
.section.open{border-color:#E0D4CA;}
.section-hdr{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px 18px;background:none;border:none;text-align:left;gap:10px;}
.section-hdr-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.section-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.section-title{font-size:14px;font-weight:500;color:#3A2E28;line-height:1.2;}
.section-sub{font-size:11px;color:#B0A49C;margin-top:1px;}
.section-meta{display:flex;align-items:center;gap:8px;}
.section-pill{font-size:10px;font-weight:500;padding:2px 9px;border-radius:100px;background:#EAE0D6;color:#7A6A60;}
.section-pill.done{background:#D4EAD5;color:#2A5C30;}
.section-chev{color:#C9BCB4;font-size:13px;display:inline-block;transition:transform .25s;flex-shrink:0;}
.section-chev.open{transform:rotate(180deg);}
.section-body{display:none;padding:0 18px 16px;}
.section-body.open{display:block;}

/* INLINE CARD (no collapse wrapper) */
.card{background:#FFFCF8;border-radius:16px;padding:16px 18px;border:1px solid #EAE0D6;}
.card-dashed{border-radius:16px;padding:16px 18px;border:1px dashed #C9BCB4;}
.card-frozen{background:#F7F3EE;border-radius:12px;padding:12px 16px;border:1px solid #EAE0D6;}
.card-reset{background:#FEF5F4;border-radius:16px;border:1px solid #EAE0D6;}
.card-reset.open{border-color:#D4A5A0;}

/* LABELS */
.slabel{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#A89E96;margin:0 0 10px;display:block;}
.sub-slabel{font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#C4B8B0;margin:12px 0 6px;display:block;}
.bonus-div{height:1px;background:#EAE0D6;margin:10px 0 8px;}

/* CHECKS */
.check-btn{display:flex;align-items:flex-start;gap:11px;background:none;border:none;padding:6px 0;text-align:left;width:100%;touch-action:manipulation;}
.check-circle{margin-top:2px;width:20px;height:20px;border-radius:50%;flex-shrink:0;border:1.5px solid #C9BCB4;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.check-circle.done{border-color:#7A9E7E;background:#7A9E7E;}
.check-circle.bon{border-color:#D8CFC8;}
.check-circle.bon.done{border-color:#A8C4A8;background:#A8C4A8;}
.check-label{font-size:14px;line-height:1.4;color:#3A2E28;display:block;transition:all .2s;}
.check-label.done{color:#A89E96;text-decoration:line-through;}
.check-label.bon{font-size:13px;color:#8A7A72;}
.check-label.bon.done{color:#C0B4AC;}
.check-note{display:block;font-size:11px;color:#B0A49C;margin-top:2px;line-height:1.4;}

/* PILLS */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:500;background:#EAE0D6;color:#7A6A60;transition:all .3s;}
.pill.done{background:#D4EAD5;color:#2A5C30;}

/* MOOD */
.mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.mood-btn{padding:10px 8px;border-radius:11px;border:1.5px solid #DDD4CA;background:transparent;color:#9E9089;font-size:13px;font-weight:500;transition:all .2s;line-height:1.3;}
.mood-sub{margin-top:10px;font-style:italic;font-size:15px;color:#6B5A52;display:none;line-height:1.4;}
.mood-sub.show{display:block;}

/* FOCUS */
.focus-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-radius:10px;border:0.5px solid #EAE0D6;background:transparent;font-size:13px;color:#5A4A42;width:100%;text-align:left;gap:8px;margin-bottom:6px;transition:all .15s;}
.focus-btn.sel{border-color:#C17F6B;background:#FBF0EB;color:#8B4020;font-weight:500;}
.focus-tag{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#A89E96;background:#F0E8E0;border-radius:5px;padding:2px 7px;flex-shrink:0;}

/* TASKS */
.task-area{margin-top:10px;padding:11px 13px;background:#F7F2EC;border-radius:11px;}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:5px 0;}
.task-circle{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:1.5px solid #C9BCB4;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px;}
.task-circle.done{border-color:#C17F6B;background:#C17F6B;}
.task-label{font-size:13px;color:#3A2E28;flex:1;line-height:1.4;transition:all .2s;}
.task-label.done{color:#A89E96;text-decoration:line-through;}
.task-del{font-size:18px;color:#D8CFC8;background:none;border:none;line-height:1;padding:0 2px;flex-shrink:0;}
.task-input-row{display:flex;gap:7px;margin-top:8px;}
.task-input{flex:1;padding:8px 11px;border-radius:9px;border:0.5px solid #EAE0D6;font-size:13px;background:#FFFCF8;color:#3A2E28;}
.task-add-btn{padding:8px 14px;border-radius:9px;border:none;background:#C17F6B;color:white;font-size:13px;font-weight:500;flex-shrink:0;}
.task-cap-msg{font-size:12px;color:#B0A49C;font-style:italic;margin-top:8px;text-align:center;}
.task-empty{font-size:12px;color:#C4B8B0;font-style:italic;padding:2px 0;}

/* REGULATE */
.reg-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.reg-tab{flex:1;min-width:65px;padding:6px 4px;border-radius:8px;border:none;font-size:11px;font-weight:500;background:#EDE4DC;color:#7A6E66;transition:all .2s;line-height:1.3;}
.reg-tab.active{background:#7A7EAE;color:white;}
.reg-item{padding:9px 12px;border-radius:10px;background:#F7F1EB;font-size:13px;color:#4A3A34;margin-bottom:6px;border:1px solid #EAE0D6;}

/* RESET */
.reset-title{font-size:14px;font-weight:600;color:#B85C54;margin:0 0 12px;line-height:1.3;}
.reset-night{background:#FEF0EE;border:1px solid #F5D5D0;border-radius:9px;padding:10px 13px;margin:12px 0;}
.reset-night-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C17060;margin:0 0 4px;}
.reset-night-text{font-size:13px;color:#9A6560;line-height:1.5;}
.reset-no{margin-top:10px;padding:10px 13px;border-radius:9px;background:#FAF0EE;border:1px solid #EDD8D4;}
.reset-no-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C4857A;margin:0 0 6px;}
.reset-no-item{font-size:13px;color:#9A6560;padding:2px 0;line-height:1.4;}

/* FROZEN */
.frozen-steps{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.frozen-step{font-size:12px;color:#6B5A52;background:#FFFCF8;border-radius:20px;padding:4px 11px;border:0.5px solid #EAE0D6;}

/* MVD */
.mvd-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.mvd-item{font-size:11px;color:#9E9089;background:#EAE0D6;border-radius:20px;padding:3px 10px;}

/* TOP RULES */
.top-rules{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.top-rule{font-size:11px;color:#B0A49C;background:#EAE0D6;border-radius:20px;padding:3px 10px;}

/* TEXTAREA */
.mini-ta{width:100%;min-height:50px;border:0.5px solid #EAE0D6;border-radius:9px;padding:9px 11px;font-size:13px;color:#3A2E28;background:#F7F1EB;resize:none;line-height:1.5;}
.mini-label{font-size:9.5px;color:#A89E96;margin:12px 0 5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:block;}
.mini-label:first-of-type{margin-top:0;}

/* MISC */
.section-intro{font-size:12px;color:#B0A49C;margin:0 0 11px;font-style:italic;}
.footer-msg{text-align:center;font-size:14px;font-style:italic;color:#B0A49C;margin:4px 0 0;padding-bottom:8px;}
.header-h1{font-size:26px;font-weight:500;color:#241C18;margin:0;line-height:1.1;}
.header-phrase{font-size:13px;font-style:italic;color:#9E9089;margin:3px 0 0;line-height:1.4;}
.carry{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;border-radius:9px;background:#F7F1EB;border:0.5px solid #EAE0D6;flex-wrap:wrap;margin-top:6px;}
.sun-item{padding:9px 12px;border-radius:10px;background:#F7F1EB;font-size:13px;color:#4A3A34;margin-bottom:7px;border:1px solid #EAE0D6;}
.rule-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.rule-num{width:17px;height:17px;border-radius:50%;background:#EAE0D6;display:flex;align-items:center;justify-content:center;font-size:9px;color:#9E9089;flex-shrink:0;margin-top:2px;font-weight:700;}
.hist-entry{border-radius:14px;border:1px solid #EAE0D6;overflow:hidden;margin-bottom:10px;background:#FFFCF8;}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;width:100%;padding:12px 16px;background:none;border:none;text-align:left;}
.hist-body{padding:10px 16px 14px;display:none;border-top:1px solid #EAE0D6;}
.hist-body.open{display:block;}

@keyframes fu{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fu .22s ease forwards;}
@keyframes ck{0%{transform:scale(1);}50%{transform:scale(1.18);}100%{transform:scale(1);}}
.ck{animation:ck .18s ease;}

/* SETTINGS */
.settings-card{background:#FFFCF8;border-radius:16px;padding:20px;border:1px solid #EAE0D6;margin-bottom:10px;}
.settings-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.settings-field:last-of-type{margin-bottom:0;}
.settings-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#A89E96;}
.settings-input{padding:10px 12px;border-radius:10px;border:1px solid #EAE0D6;font-size:13px;color:#3A2E28;background:#F7F1EB;width:100%;}
.settings-btn{width:100%;padding:12px;border-radius:12px;border:none;background:#3A2E28;color:#F2EBE2;font-size:14px;font-weight:500;margin-top:6px;}
.settings-btn.secondary{background:#EAE0D6;color:#5A4A42;}
.settings-btn.danger{background:#FEF5F4;color:#C17060;border:1px solid #F0D5D0;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:#B0A49C;margin-top:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#C4B8B0;flex-shrink:0;}
.sync-dot.ok{background:#7A9E7E;}
.sync-dot.err{background:#C17060;}
.sync-dot.syncing{background:#C17F6B;animation:pulse .8s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">Daily OS</span>
  <div class="sync-status" id="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-txt"></span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('today')">Today</button>
    <button class="nav-tab" onclick="switchView('history')">Log</button>
    <button class="nav-tab" onclick="switchView('settings')">⚙️</button>
  </div>
</nav>

<div id="view-today" class="page"></div>
<div id="view-history" class="page" style="display:none;"></div>
<div id="view-settings" class="page" style="display:none;"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const PHRASES=["Soft with yourself. Honest with yourself.","You don't have to earn rest.","Small consistency beats intensity.","One good thing is enough today.","Stability over perfection.","You showed up. That counts.","Today only needs to be lived once."];
const TOP_RULES=["Reference, not a demand","Missed time is not owed","Afternoons are yours","Avoidance is information"];
const MVD_ITEMS=["water","food","hygiene","one small thing","sleep"];
const FROZEN_STEPS=["1. Shower","2. Tea","3. Outside","4. Music on","5. Walk 10 mins","6. One tiny thing"];

const MORN_ESS=[
  {id:"wake",  label:"Out of bed — within your wake window",note:"Target: 7:30–8:00  ·  Still okay: before 9:00"},
  {id:"water", label:"Water — before the phone"},
  {id:"shower",label:"Shower & get dressed"},
  {id:"coffee",label:"Coffee"},
  {id:"brunch",label:"High protein brunch"},
];
const MORN_BON=[
  {id:"move",  label:"Movement — walk, Apple Fitness+ or KX Pilates"},
  {id:"light", label:"Outside light / fresh air"},
];
const EVE_ESS=[
  {id:"dinner", label:"High protein dinner"},
  {id:"hygiene",label:"Wash face, brush teeth, skincare"},
  {id:"tidy",   label:"Tidy one thing before bed"},
  {id:"phone",  label:"Phone down — low stimulation"},
  {id:"bed",    label:"Begin winding down by 10pm"},
];
const EVE_BON=[
  {id:"emove",  label:"Walk or yoga — wind down"},
  {id:"prep",   label:"Prep for tomorrow"},
  {id:"eread",  label:"Read or low stimulation"},
  {id:"reflect",label:"A moment of reflection"},
];
const FOCUS=[
  {id:"et-ops",label:"EdTec — Operations & Strategy",  tag:"EDTEC"},
  {id:"et-sup",label:"EdTec — Student Support & Admin",tag:"EDTEC"},
  {id:"et-mkt",label:"EdTec — Marketing",              tag:"EDTEC"},
  {id:"hs-ops",label:"Handmade Stories — Operations",  tag:"HS"},
  {id:"ff-cre",label:"FōFunc Studio — Creative work",  tag:"FŌFUNC"},
  {id:"admin", label:"Admin & life tasks",             tag:"LIFE"},
  {id:"rest",  label:"Rest day (intentional)",         tag:"REST"},
];
const SUNDAY_PICKS=["🐕  Dog park","🥾  Hike","🧹  Errands or chores","🏠  Time with husband — no agenda","👨‍👩‍👧  Family visit","🛁  Full reset day"];
const MOOD={
  great:{label:"Good energy ✦",sub:"Use it intentionally. Don't burn it all at once.",bg:"#E8F4D4",col:"#2A5020",tab:"high"},
  good: {label:"Normal",       sub:"Work the plan.",                                  bg:"#D4EAD5",col:"#2A5C30",tab:"medium"},
  low:  {label:"Low energy",   sub:"Anchors first. Everything else second.",          bg:"#FDE8D8",col:"#8B4020",tab:"low"},
  rough:{label:"Rough day",    sub:"Reset list only. That's it.",                    bg:"#EDE4DC",col:"#6B5044",tab:"numb"},
};
const REG_TABS=[
  {key:"numb",  label:"When numb"},
  {key:"low",   label:"Low energy"},
  {key:"stim",  label:"Need stimulation"},
  {key:"medium",label:"Medium"},
  {key:"high",  label:"High energy"},
];
const REG={
  numb:["🍵  Make tea or chai — sit with your husband","🎵  Music — familiar, no decisions","🌿  Sit outside — just sit","🚿  Shower — even a short one","📺  Comfort show — guilt-free","🕯️  Candle or incense","🤗  Cuddle — husband or the dog","🧘  Lie down and stretch slowly"],
  low:["🚶  Short walk — no destination needed","🎧  Audiobook while doing something easy","📐  Organise something small","📖  Read — even a few pages","🖼️  Browse interiors or design inspiration","🧹  Light chores"],
  stim:["🚗  Drive somewhere new — music loud, no plan","📸  Camera to a market or unfamiliar street","🛍️  Browse a design or homewares store","🖨️  Start a 3D print — just for you, no brief","💡  Sketch a lamp idea — freehand, no rules","🌆  Drive to a new suburb and walk around","🎵  High-energy playlist — dance, clean, build","☕  New café you've never been to"],
  medium:["🐕  Dog park — movement plus warmth","☕  Café session — familiar spot, change of scene","✏️  Sketch, draw, or make something freely","💡  Tinker with a lamp or 3D print idea","🍳  Cook something proper","📸  Photography walk","🛒  Errands — useful movement"],
  high:["🏋️  KX Pilates or Apple Fitness+","🥾  Hike — proper one","🖨️  3D print session — build something real","🎨  Full FōFunc creative block","🌆  Adventure with your husband — somewhere new","👨‍👩‍👧  Proper family time — parents or brother","💡  Design a new lamp structure — full session"],
};
const RESET_LIST=["Drink water","Shower","Eat something with protein","Go outside — even 10 minutes","One tiny task — the smallest possible","Sleep reset attempt tonight","Tomorrow starts fresh"];
const RESET_NO=["Catching up","Redesigning your life","Self-criticism","Punishment productivity","Making big decisions"];
const RULES=["This is a reference, not a demand","If the anchors happen, the day counts","Avoidance is information, not failure","One bad day changes nothing","No catch-up days — missed time is not owed","The system adapts with your capacity","Rest is productive when intentional","Small consistency beats intensity"];

// ── STORAGE ───────────────────────────────────────────────────────────────────
function todayKey(){return new Date().toISOString().slice(0,10);}

function emptyState(){
  return {morning:{},evening:{},focus:null,mood:null,regTab:"low",
          resetChecked:{},tasks:{},win:"",tmrTarget:"",sundayMode:false,
          openSections:{mood:true,daystart:true,target:false,regulate:false,reset:false,close:false,rules:false}};
}

function initState(){
  const tk = todayKey();
  // Start with whatever is in localStorage immediately (fast load)
  let s = emptyState();
  const stored = localStorage.getItem("dos_"+tk);
  if(stored){
    try{
      const parsed = JSON.parse(stored);
      if(!parsed.morning)parsed.morning={};
      if(!parsed.evening)parsed.evening={};
      if(!parsed.tasks)parsed.tasks={};
      if(!parsed.resetChecked)parsed.resetChecked={};
      if(!parsed.openSections)parsed.openSections={mood:true,daystart:true,target:false,regulate:false,reset:false,close:false,rules:false};
      if(!REG[parsed.regTab])parsed.regTab="low";
      s = parsed;
    }catch(e){}
  }
  // Always try to pull today from Supabase on load — overrides local if newer
  pullFromSupabase(tk).then(remote=>{
    if(remote){
      Object.assign(S, remote);
      if(!S.openSections)S.openSections={mood:true,daystart:true,target:false,regulate:false,reset:false,close:false,rules:false};
      if(!REG[S.regTab])S.regTab="low";
      // Save merged state locally
      try{localStorage.setItem("dos_"+tk, JSON.stringify(S));}catch(e){}
      if(currentView==="today")render();
    }
  });
  // Check yesterday for carry note (local first, then supabase)
  const d = new Date(); d.setDate(d.getDate()-1);
  const yestKey = "dos_"+d.toISOString().slice(0,10);
  const yestStored = localStorage.getItem(yestKey);
  if(yestStored){
    try{const y=JSON.parse(yestStored);if(y.tmrTarget&&!s._carried)s._carried=y.tmrTarget;}catch(e){}
  } else {
    // Try supabase for yesterday's carry
    pullFromSupabase(d.toISOString().slice(0,10)).then(yd=>{
      if(yd&&yd.tmrTarget&&!S._carried){
        S._carried=yd.tmrTarget;
        if(currentView==="today")render();
      }
    });
  }
  return s;
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
function getSBConfig(){
  try{const c=localStorage.getItem("dos_sb_config");return c?JSON.parse(c):null;}catch(e){return null;}
}
function saveSBConfig(url,key){
  try{localStorage.setItem("dos_sb_config",JSON.stringify({url,key}));}catch(e){}
}

let _sb=null;
function getSB(){
  if(_sb)return _sb;
  const cfg=getSBConfig();
  if(!cfg||!cfg.url||!cfg.key)return null;
  try{
    const lib=window.supabase||window.Supabase;
    if(!lib||!lib.createClient)return null;
    _sb=lib.createClient(cfg.url,cfg.key);
    return _sb;
  }catch(e){console.error("SB init error:",e);return null;}
}

function setSyncStatus(state,msg){
  const dot=document.getElementById("sync-dot");
  const txt=document.getElementById("sync-txt");
  if(dot){dot.className="sync-dot"+(state?" "+state:"");}
  if(txt)txt.textContent=msg||"";
}

async function pushToSupabase(data){
  const sb=getSB();if(!sb)return;
  try{
    setSyncStatus("syncing","Syncing...");
    // Strip internal keys before saving
    const clean={...data};
    delete clean._carried;
    const {error}=await sb.from("daily_logs").upsert({date:todayKey(),data:clean,updated_at:new Date().toISOString()},{onConflict:"date"});
    if(error)throw error;
    setSyncStatus("ok","Synced ✓");
    setTimeout(()=>setSyncStatus("",""),3000);
  }catch(e){
    setSyncStatus("err","Sync failed");
    console.error("Push error:",e);
  }
}

async function pullFromSupabase(dateKey){
  const sb=getSB();if(!sb)return null;
  try{
    const {data,error}=await sb.from("daily_logs").select("data").eq("date",dateKey).single();
    if(error||!data)return null;
    return data.data;
  }catch(e){return null;}
}

async function pullHistory(){
  const sb=getSB();if(!sb)return null;
  try{
    const {data,error}=await sb.from("daily_logs").select("date,data").order("date",{ascending:false}).limit(60);
    if(error||!data)return null;
    return data.map(r=>({date:r.date,...r.data}));
  }catch(e){return null;}
}

function saveS(){
  const tk = todayKey();
  const payload = JSON.stringify(S);
  try{localStorage.setItem("dos_"+tk, payload);}catch(e){}
  pushToSupabase(S);
}

function loadHistory(){
  const out=[]; const tk=todayKey();
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith("dos_")){
        const date=k.slice(4);
        if(date!==tk){const r=localStorage.getItem(k);if(r)out.push({date,...JSON.parse(r)});}
      }
    }
  }catch(e){}
  return out.sort((a,b)=>b.date.localeCompare(a.date));
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}
function svgChk(col="white"){return`<svg width="9" height="7" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function fmtDate(ds){const d=new Date(ds+"T12:00:00");return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});}
function mornDone(){return MORN_ESS.every(a=>!!S.morning[a.id]);}
function eveDone(){return EVE_ESS.every(a=>!!S.evening[a.id]);}
function canAdd(fid){return(S.tasks[fid]||[]).filter(t=>!t.done).length<3;}

// ── MAKE CHECK ────────────────────────────────────────────────────────────────
function makeCheck(label,note,checked,isBonus,onchange){
  const b=document.createElement("button"); b.className="check-btn";
  const circ=document.createElement("span");
  const lbl=document.createElement("span");
  let state=!!checked;
  function updateVis(){
    circ.className="check-circle"+(isBonus?" bon":"")+(state?" done":"");
    circ.innerHTML=state?svgChk():"";
    lbl.className="check-label"+(isBonus?" bon":"")+(state?" done":"");
  }
  updateVis();
  const txtWrap=document.createElement("span"); txtWrap.style.flex="1";
  lbl.textContent=label; txtWrap.appendChild(lbl);
  if(note){const n=el("span","check-note",note); txtWrap.appendChild(n);}
  b.appendChild(circ); b.appendChild(txtWrap);
  b.onclick=()=>{
    state=!state;
    circ.classList.add("ck"); setTimeout(()=>circ.classList.remove("ck"),200);
    updateVis();
    onchange(state);
  };
  return b;
}

// ── COLLAPSIBLE SECTION ───────────────────────────────────────────────────────
function makeSection(id,iconEmoji,iconBg,title,sub,metaEl,buildBody){
  const wrap=el("div","section"+(S.openSections[id]?" open":""));
  const hdr=el("button","section-hdr");

  const left=el("div","section-hdr-left");
  const icon=el("div","section-icon",iconEmoji);
  icon.style.background=iconBg;
  const info=el("div");
  info.innerHTML=`<div class="section-title">${title}</div>${sub?`<div class="section-sub">${sub}</div>`:""}`;
  left.appendChild(icon); left.appendChild(info);

  const meta=el("div","section-meta");
  if(metaEl)meta.appendChild(metaEl);
  const chev=el("span","section-chev"+(S.openSections[id]?" open":""),"↓");

  hdr.appendChild(left); hdr.appendChild(meta); hdr.appendChild(chev);

  const body=el("div","section-body"+(S.openSections[id]?" open":""));
  buildBody(body);

  hdr.onclick=()=>{
    const isOpen=body.classList.contains("open");
    body.classList.toggle("open",!isOpen);
    wrap.classList.toggle("open",!isOpen);
    chev.classList.toggle("open",!isOpen);
    S.openSections[id]=!isOpen;
    saveS();
  };

  wrap.appendChild(hdr); wrap.appendChild(body);
  return {wrap, body, refreshMeta:(fn)=>{meta.innerHTML=""; const m=fn(); if(m)meta.appendChild(m); meta.appendChild(chev);}};
}

// ── TASK BUILDER ──────────────────────────────────────────────────────────────
function buildTaskArea(fid){
  const wrap=el("div","task-area fade");
  function rt(){
    wrap.innerHTML="";
    const tasks=S.tasks[fid]||[];
    if(!tasks.length)wrap.appendChild(el("p","task-empty","Add up to 3 tasks for this block."));
    tasks.forEach((t,i)=>{
      const row=el("div","task-item");
      const circ=el("button","task-circle"+(t.done?" done":""));
      circ.innerHTML=t.done?svgChk():"";
      circ.onclick=()=>{S.tasks[fid][i].done=!S.tasks[fid][i].done;saveS();rt();};
      const lbl=el("span","task-label"+(t.done?" done":""),t.label);
      const del=el("button","task-del","×");
      del.onclick=()=>{S.tasks[fid].splice(i,1);saveS();rt();};
      row.appendChild(circ); row.appendChild(lbl); row.appendChild(del);
      wrap.appendChild(row);
    });
    if(canAdd(fid)){
      const ir=el("div","task-input-row");
      const inp=el("input","task-input"); inp.placeholder="Add a task..."; inp.type="text";
      const btn=el("button","task-add-btn","+ Add");
      const doAdd=()=>{
        const v=inp.value.trim(); if(!v)return;
        if(!S.tasks[fid])S.tasks[fid]=[];
        S.tasks[fid].push({id:Date.now().toString(),label:v,done:false});
        inp.value=""; saveS(); rt();
      };
      btn.onclick=doAdd;
      inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();doAdd();}});
      ir.appendChild(inp); ir.appendChild(btn); wrap.appendChild(ir);
    } else {
      wrap.appendChild(el("p","task-cap-msg","Start here. Complete one to add another."));
    }
  }
  rt(); return wrap;
}

  const cfg=getSBConfig()||{};

  wrap.innerHTML=`
    <p style="font-size:24px;font-weight:500;color:#241C18;margin:0 0 3px">Settings</p>
    <p style="font-size:13px;color:#9E9089;margin:0 0 16px;font-style:italic">Connect Supabase to sync across all your devices.</p>

    <div class="settings-card">
      <p style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#7A9E7E;margin:0 0 12px">Supabase sync</p>
      <div class="settings-field">
        <label class="settings-label">Project URL</label>
        <input class="settings-input" id="sb-url" type="url" placeholder="https://xxxx.supabase.co" value="${cfg.url||""}"/>
      </div>
      <div class="settings-field">
        <label class="settings-label">Anon / Public Key</label>
        <input class="settings-input" id="sb-key" type="text" placeholder="eyJh..." value="${cfg.key||""}"/>
      </div>
      <button class="settings-btn" onclick="saveSupabaseConfig()">Save & connect</button>
      ${cfg.url?`<button class="settings-btn danger" style="margin-top:8px" onclick="disconnectSupabase()">Disconnect</button>`:""}
      <div id="sb-test-result" style="margin-top:10px;font-size:13px;color:#9E9089;"></div>
    </div>

    <div class="settings-card">
      <p style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#B0A49C;margin:0 0 12px">Sync history</p>
      <button class="settings-btn secondary" onclick="syncAllHistory()">Pull all history from Supabase</button>
      <p style="font-size:12px;color:#C4B8B0;margin-top:8px;font-style:italic">Use this when switching devices to pull your full log.</p>
    </div>

    <div class="settings-card">
      <p style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C17060;margin:0 0 12px">Reset</p>
      <button class="settings-btn danger" onclick="if(confirm('Clear all local data? Supabase data stays safe.')){clearLocal();}">Clear local data</button>
      <p style="font-size:12px;color:#C4B8B0;margin-top:8px;font-style:italic">Only clears this device. Your Supabase data is untouched.</p>
    </div>
  `;
}

async function saveSupabaseConfig(){
  const url=document.getElementById("sb-url").value.trim().replace(/\/$/,"");
  const key=document.getElementById("sb-key").value.trim();
  const res=document.getElementById("sb-test-result");
  if(!url||!key){res.textContent="Please enter both URL and key.";return;}
  res.textContent="Testing connection...";res.style.color="#9E9089";
  try{
    _sb=null;
    saveSBConfig(url,key);
    const lib=window.supabase||window.Supabase;
    if(!lib||!lib.createClient){
      res.textContent="✗ Supabase library not loaded. Check internet connection.";
      res.style.color="#C17060";return;
    }
    const testClient=lib.createClient(url,key);
    const {data,error}=await testClient.from("daily_logs").select("date").limit(1);
    if(error){
      res.textContent="✗ Error: "+error.message;
      res.style.color="#C17060";_sb=null;return;
    }
    _sb=testClient;
    res.textContent="✓ Connected! Syncing now...";res.style.color="#7A9E7E";
    await pushToSupabase(S);
    res.textContent="✓ Connected and synced!";
  }catch(e){
    res.textContent="✗ Failed: "+(e.message||"Unknown error");
    res.style.color="#C17060";_sb=null;
    console.error("Supabase connect error:",e);
  }
}

function disconnectSupabase(){
  if(!confirm("Disconnect Supabase? Your local data stays."))return;
  localStorage.removeItem("dos_sb_config");
  _sb=null;
  renderSettings();
}

async function syncAllHistory(){
  const res=document.getElementById("sb-test-result")||{textContent:""};
  const hist=await pullHistory();
  if(!hist){alert("Couldn't pull history. Check your connection.");return;}
  hist.forEach(entry=>{
    const {date,...data}=entry;
    if(date!==todayKey()){
      try{localStorage.setItem("dos_"+date,JSON.stringify(data));}catch(e){}
    }
  });
  alert("History synced — "+hist.length+" days pulled.");
}

function clearLocal(){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("dos_")&&!k.includes("sb_"))keys.push(k);}
  keys.forEach(k=>localStorage.removeItem(k));
  S=initState();
  render();
  switchView("today");
}

render();
</script>
</body>
</html>
